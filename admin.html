<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Landmark Blog</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        background: #f1f5f9;
        min-height: 100vh;
      }

      
      .sidebar {
        width: 240px;
        background: #0f172a;
        color: white;
        min-height: 100vh;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px 24px;
        border-bottom: 1px solid #1e293b;
        margin-bottom: 12px;
      }

      .sidebar-brand .avatar {
        width: 36px;
        height: 36px;
        background: #22c55e;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
      }

      .sidebar-brand .brand-info {
        display: flex;
        flex-direction: column;
      }

      .sidebar-brand .brand-title {
        font-weight: 700;
        font-size: 14px;
      }

      .sidebar-brand .brand-email {
        font-size: 11px;
        color: #94a3b8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 140px;
      }

      .sidebar a {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #cbd5e1;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #1e293b;
        color: white;
      }

      .sidebar-spacer {
        flex: 1;
      }

      .logout-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        background: transparent;
        border: 1px solid #ef4444;
        color: #ef4444;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .logout-btn:hover {
        background: #ef4444;
        color: white;
      }

      
      .main {
        flex: 1;
        padding: 28px;
        overflow-y: auto;
      }

      
      .top-header {
        background: white;
        padding: 16px 20px;
        border-radius: 10px;
        margin-bottom: 24px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .top-header h2 {
        font-size: 18px;
        color: #0f172a;
      }

      .top-header .welcome {
        font-size: 13px;
        color: #64748b;
      }

      
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
      }

      .card .card-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin-bottom: 8px;
      }

      .card .card-value {
        font-size: 32px;
        font-weight: 700;
        color: #0f172a;
      }

      
      .section {
        background: white;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
        margin-bottom: 24px;
      }

      .section h3 {
        font-size: 16px;
        color: #0f172a;
        margin-bottom: 18px;
        padding-bottom: 12px;
        border-bottom: 1px solid #f1f5f9;
      }

      
      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #334155;
        margin-bottom: 6px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
        color: #0f172a;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        outline: none;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
      }

      .submit-btn {
        background: #22c55e;
        color: white;
        border: none;
        padding: 11px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .submit-btn:hover {
        background: #16a34a;
      }

      .submit-btn:disabled {
        background: #86efac;
        cursor: not-allowed;
      }

      
      #message {
        margin-top: 14px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        display: none;
      }

      #message.success {
        display: block;
        background: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
      }

      #message.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      
      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead th {
        background: #f8fafc;
        color: #64748b;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 10px 14px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
      }

      tbody tr {
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.15s;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      tbody td {
        padding: 12px 14px;
        color: #334155;
        vertical-align: middle;
      }

      .post-thumb {
        width: 56px;
        height: 40px;
        object-fit: cover;
        border-radius: 6px;
        display: block;
      }

      .delete-btn {
        background: transparent;
        border: 1px solid #ef4444;
        color: #ef4444;
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .delete-btn:hover {
        background: #ef4444;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <div class="sidebar-brand">
        <div class="avatar" id="adminInitial">A</div>
        <div class="brand-info">
          <span class="brand-title">Admin Panel</span>
          <span class="brand-email" id="adminEmail">—</span>
        </div>
      </div>

      <a href="#" class="active">Dashboard</a>
      <a href="#addPost">Add Post</a>
      <a href="#managePosts">Manage Posts</a>

      <div class="sidebar-spacer"></div>

      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>

    <div class="main">
      <div class="top-header">
        <h2>Landmark Blog Admin</h2>
        <span class="welcome">Welcome back, Admin</span>
      </div>

      <div class="cards">
        <div class="card">
          <div class="card-label">Total Posts</div>
          <div class="card-value" id="totalPosts">—</div>
        </div>

        <div class="card">
          <div class="card-label">Published</div>
          <div class="card-value" id="publishedPosts">—</div>
        </div>

        <div class="card">
          <div class="card-label">Total Users</div>
          <div class="card-value" id="totalUsers">—</div>
        </div>
      </div>

      <!-- Add Post form -->
      <div class="section" id="addPost">
        <h3>Add New Landmark Post</h3>

        <form id="addPostForm">
          <div class="form-group">
            <label for="landmarkTitle"
              >Landmark Title <span style="color: #ef4444">*</span></label
            >
            <input
              type="text"
              id="landmarkTitle"
              placeholder="e.g. Eiffel Tower"
              required
            />
          </div>

          <div class="form-group">
            <label for="landmarkImage"
              >Image URL
              <span style="color: #94a3b8; font-weight: 400"
                >(optional)</span
              ></label
            >
            <input
              type="url"
              id="landmarkImage"
              placeholder="https://example.com/image.jpg"
            />
          </div>

          <div class="form-group">
            <label for="landmarkDescription"
              >Description <span style="color: #ef4444">*</span></label
            >
            <textarea
              id="landmarkDescription"
              rows="5"
              placeholder="Write a description of this landmark…"
              required
            ></textarea>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            Publish Post
          </button>

          <div id="message"></div>
        </form>
      </div>

      <div class="section" id="managePosts">
        <h3>Manage Posts</h3>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Description</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="postsTableBody">
              <tr>
                <td
                  colspan="4"
                  style="text-align: center; padding: 24px; color: #94a3b8"
                >
                  Loading…
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="admin.js"></script>
  </body>
</html>
